schema: deck/v1
title: Linux File Permissions — Basics
level: foundation
description: |
  The day-to-day permission model: rwx triplets, octal mode, ownership,
  umask, and how `ls -l` columns map to the underlying inode fields.

cards:
  - front: "What do `r`, `w`, and `x` mean for a regular file?"
    back: |
      - `r` — read the file's contents.
      - `w` — modify the file's contents (or truncate it).
      - `x` — execute the file as a program.

      Note: deleting a file requires `w` on its containing **directory**,
      not on the file itself.
    hint: "noob"
    tags: [permissions, rwx]

  - front: "What do `r`, `w`, and `x` mean for a directory?"
    back: |
      - `r` — list entries (`ls`) inside the directory.
      - `w` — create, rename, or delete entries inside the directory.
      - `x` — traverse into the directory (use any path through it).

      `x` without `r` lets you `cd` in if you already know the filenames,
      but `ls` fails.
    tags: [permissions, directories]

  - front: "Convert `rwxr-x---` to its octal mode."
    back: |
      `750`. Each triplet sums to 4 (r) + 2 (w) + 1 (x):

      ```
      rwx = 7 = 4+2+1   (owner)
      r-x = 5 = 4+0+1   (group)
      --- = 0           (others)
      ```
    tags: [permissions, octal]

  - front: "What does `chmod u+x file` do?"
    back: |
      Adds the execute bit for the **user** (owner) only. Other targets:
      `g` (group), `o` (others), `a` (all). Use `=` to set, `-` to remove,
      `+` to add. Example: `chmod go-w file` removes write for group and
      others.
    tags: [chmod, commands]

  - front: "What does `chown alice:devs file` do?"
    back: |
      Sets the owner to `alice` and the group to `devs`. Only root may
      change ownership; the current owner may change the group, but only
      to a group they belong to.
    tags: [chown, ownership]

  - front: "What is a umask, and what does `umask 022` mean?"
    back: |
      The umask is a bitmask **subtracted** from the default mode when new
      files (`0666`) and directories (`0777`) are created. `022` removes
      write for group and others, so:

      ```
      file:      0666 & ~022 = 0644 (rw-r--r--)
      directory: 0777 & ~022 = 0755 (rwxr-xr-x)
      ```
    tags: [umask, defaults]

  - front: "Map each column of `ls -l` output to its meaning."
    back: |
      Example: `-rwxr-xr--  1 alice devs  4096 May  8 09:12 deploy.sh`

      1. Type + permissions (`-` file, `d` dir, `l` symlink, …)
      2. Hard link count.
      3. Owner user.
      4. Owner group.
      5. Size in bytes.
      6. Last-modified timestamp.
      7. Filename.
    tags: [ls, output]
