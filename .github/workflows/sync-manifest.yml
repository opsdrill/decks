name: Sync Topics Manifest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch manifest
        run: |
          curl -sf \
            -H "X-API-Key: ${{ secrets.MANIFEST_API_KEY }}" \
            https://api.opsdrill.dev/api/v1/content/manifests/topics/ \
            | jq '.data' > topics.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet topics.json; then
            echo "No changes to topics.json"
          else
            git add topics.json
            git commit -m "chore: sync topics manifest"
            git push
          fi
