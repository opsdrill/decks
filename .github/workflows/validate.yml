name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate layout
        run: python scripts/validate_layout.py

      - name: Validate YAML against schemas
        run: python scripts/validate_yaml.py

  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deck import
        run: |
          curl -f -X POST https://api.opsdrill.dev/api/v1/content/import-decks/ \
            -H "Authorization: Bearer ${{ secrets.DECK_IMPORT_TOKEN }}" \
            -H "Content-Type: application/json"
